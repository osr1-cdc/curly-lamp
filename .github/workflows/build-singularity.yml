name: Build and Release Singularity Container

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v2.0.0 or auto for YYYY-MM-DD)'
        required: false
        default: 'auto'
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        type: boolean
        default: false

jobs:
  build-singularity:
    name: Build Singularity .sif Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write  # For creating releases
      packages: write  # For uploading artifacts

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry>=1.5.0 pytest pytest-cov

    - name: Run tests before build
      run: |
        poetry config virtualenvs.create false
        poetry install
        pytest tests/ -v --tb=short

    - name: Set up Singularity
      uses: eWaterCycle/setup-singularity@v7
      with:
        singularity-version: 3.11.0

    - name: Build Singularity .sif from definition
      run: |
        sudo singularity build sc2-proportion-modeling.sif Singularity.def

    - name: Verify Singularity image
      run: |
        # Test the Singularity image
        singularity inspect sc2-proportion-modeling.sif
        singularity exec sc2-proportion-modeling.sif sc2-run --help

    - name: Generate release tag
      id: tag
      run: |
        if [ "${{ github.event.inputs.release_tag }}" = "auto" ] || [ -z "${{ github.event.inputs.release_tag }}" ]; then
          TAG="v$(date +%Y.%m.%d)-${GITHUB_SHA:0:7}"
        else
          TAG="${{ github.event.inputs.release_tag }}"
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Release tag: $TAG"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        files: sc2-proportion-modeling.sif
        draft: false
        prerelease: ${{ github.event.inputs.prerelease }}
        body: |
          # SC2 Proportion Modeling Singularity Container

          **Release:** ${{ steps.tag.outputs.tag }}
          **Build Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Commit:** ${{ github.sha }}

          ## Usage on HPC with Singularity

          ```bash
          # Download
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/sc2-proportion-modeling.sif

          # Run with SGE
          singularity run \
            --bind $(pwd)/config:/app/config \
            --bind $(pwd)/results:/app/results \
            sc2-proportion-modeling.sif \
            --config /app/config/config.yml
          ```

          ## File Info
          - **Filename:** sc2-proportion-modeling.sif
          - **Format:** Singularity/Apptainer
          - **Python:** 3.11
          - **R:** Latest (via Conda)
          - **Size:** ~1.2GB (compressed)

          For detailed instructions, see [HPC_DEPLOYMENT.md](../../HPC_DEPLOYMENT.md)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifact to Actions
      uses: actions/upload-artifact@v3
      with:
        name: sc2-singularity-sif
        path: sc2-proportion-modeling.sif
        retention-days: 30

    - name: Job Summary
      run: |
        echo "## Build Complete ✅" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Release Tag:** ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
        echo "**Singularity Image:** sc2-proportion-modeling.sif (~1.2GB)" >> $GITHUB_STEP_SUMMARY
        echo "**Download:** https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
